<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Panel de Pon</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0d0f1a; color: #e8eaf0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex; align-items: center; justify-content: safe center;
    overflow-x: auto; overflow-y: hidden; user-select: none;
  }
  #wrap { position: relative; display: flex; gap: 18px; align-items: flex-start; }
  #stage { position: relative; }
  canvas#game { background: #07080f; border: 2px solid #2a2f45; border-radius: 6px; display: block; }
  #hud {
    width: 168px; padding: 14px 16px; background: #141728; border: 1px solid #2a2f45;
    border-radius: 6px; font-size: 14px; line-height: 1.7;
  }
  #hud h1 { font-size: 16px; margin: 0 0 10px; color: #8be9fd; letter-spacing: .5px; }
  #hud .row { display: flex; justify-content: space-between; }
  #hud .lbl { color: #6b7390; }
  #hud .val { color: #f1fa8c; font-variant-numeric: tabular-nums; font-weight: 600; }
  #hud .big { font-size: 22px; color: #ff79c6; }
  #hud .ctrl { margin-top: 10px; font-size: 11px; color: #50536b; line-height: 1.5; }
  #sidebar { display: flex; flex-direction: column; gap: 12px; }
  #stats {
    width: 168px; padding: 12px 16px; background: #141728; border: 1px solid #2a2f45;
    border-radius: 6px; font-size: 13px; line-height: 1.7;
  }
  #stats h2 { font-size: 13px; margin: 0 0 8px; color: #8be9fd; text-transform: uppercase; letter-spacing: 1px; }
  #stats .sthead { font-size: 10px; color: #6b7390; text-transform: uppercase; letter-spacing: .5px; margin-top: 6px; }
  #stats .sthead:first-child { margin-top: 0; }
  #stats .srow { display: flex; justify-content: space-between; }
  #stats .srow span:last-child { color: #f1fa8c; font-variant-numeric: tabular-nums; font-weight: 600; }
  #stats .sempty { color: #50536b; font-size: 11px; font-style: italic; }
  #stats .cols { display: flex; gap: 14px; }
  #stats .col { flex: 1; min-width: 0; }
  #stats .col .sthead { margin-top: 0; }
  #stats .col + .col .sthead { margin-top: 0; }
  #best {
    width: 168px; padding: 12px 16px; background: #141728; border: 1px solid #2a2f45;
    border-radius: 6px; font-size: 13px; line-height: 1.7;
  }
  #best h2 { font-size: 13px; margin: 0 0 8px; color: #8be9fd; text-transform: uppercase; letter-spacing: 1px; }
  #best .row { display: flex; justify-content: space-between; }
  #best .lbl { color: #6b7390; }
  #best .val { color: #50fa7b; font-variant-numeric: tabular-nums; font-weight: 600; }
  #best .val.dash { color: #50536b; }
  #overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: rgba(7,8,15,.82);
    border-radius: 6px; text-align: center;
  }
  #overlay h2 { margin: 0 0 6px; font-size: 30px; color: #ff79c6; }
  #overlay p { margin: 4px 0; color: #8be9fd; font-size: 14px; }
  #overlay .sc { font-size: 20px; color: #f1fa8c; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game" width="400" height="800"></canvas>
    <div id="overlay" class="hidden">
      <h2 id="ovTitle">PAUSED</h2>
      <p id="ovLine1"></p>
      <p id="ovLine2"></p>
    </div>
  </div>
  <div id="sidebar">
    <div id="hud">
      <h1>INFINITE<br>PANEL DE PON</h1>
    <div class="row"><span class="lbl">TIME</span><span class="val big" id="hTime">0:00</span></div>
    <div class="row"><span class="lbl">SCORE</span><span class="val big" id="hScore">0</span></div>
    <div class="row"><span class="lbl">SPEED</span><span class="val" id="hSpeed">1</span></div>
    <div class="row"><span class="lbl">LONGEST CHAIN</span><span class="val" id="hMaxChain">-</span></div>
    <div class="row"><span class="lbl">LARGEST COMBO</span><span class="val" id="hMaxCombo">-</span></div>
    <div class="row"><span class="lbl">BLOCKS CLEARED</span><span class="val" id="hCleared">0</span></div>
    <div class="row hidden" id="hWidthRow"><span class="lbl">WIDTH</span><span class="val" id="hWidth">6</span></div>
    <div class="ctrl">
      Arrows/WASD: move &nbsp; Z/Space: swap<br>
      X/Shift: raise &nbsp; P: pause<br>
      Enter: restart &nbsp; R: new game
    </div>
    </div>
    <div id="stats">
      <h2>stats</h2>
      <div id="statsBody"><div class="sempty">no chains or combos yet</div></div>
    </div>
    <div id="best">
      <h2>best</h2>
      <div class="row"><span class="lbl">SCORE</span><span class="val dash" id="bScore">-</span></div>
      <div class="row"><span class="lbl">CHAIN</span><span class="val dash" id="bChain">-</span></div>
      <div class="row"><span class="lbl">COMBO</span><span class="val dash" id="bCombo">-</span></div>
    </div>
  </div>
</div>
<script src="engine.js"></script>
<script>
"use strict";
/* ----------------------------------------------------------------------
   7. CLIENT  (browser only) — rendering, input, game loop, expansion
   ---------------------------------------------------------------------- */

if (typeof document !== 'undefined') {

// ---- visual config: 6 block colors with canvas symbols ----
const COLORS = [
  null,
  { name:'Red',    main:'#e8503a', light:'#ff8a78', symbol:'heart'    },
  { name:'Yellow', main:'#f1c40f', light:'#ffe066', symbol:'star'     },
  { name:'Blue',   main:'#3a8edc', light:'#74c4ff', symbol:'diamond'  },
  { name:'Purple', main:'#9b59b6', light:'#cb9ae0', symbol:'triangle' },
  { name:'Green',  main:'#2ecc70', main2:'#27ae60', light:'#74f2a8', symbol:'circle'  },
  { name:'Cyan',   main:'#15a9b8', light:'#4fd9e8', symbol:'square'   },
];

// Board expansion: COLUMNS ONLY (never rows). Height is fixed at BASE_ROWS.
// Columns grow with score, infinitely — the first column (6→7) arrives at
// 2500, then each subsequent threshold follows T(n+1) = ratio*T(n) + 2500.
// The ratio is 1.5x up to width 12, then drops to 1.25x beyond to slow growth.
//   Phase 1 (width 7..12): closed form T = 7500*1.5^n - 5000
//   Phase 2 (width 13+):   continues from threshold[12] at 1.25x + 2500
const BASE_COLS = 6;
const BASE_ROWS = 12;
const EXPAND_BASE_SCORE = 2500;
const EXPAND_RATIO = 1.5;
const EXPAND_RATIO_SLOW = 1.25;
const EXPAND_SLOW_COL = 12;                                 // switch ratio past this width
const EXPAND_OFFSET = EXPAND_BASE_SCORE / (EXPAND_RATIO - 1);        // 5000
const EXPAND_OFFSET_SLOW = EXPAND_BASE_SCORE / (EXPAND_RATIO_SLOW - 1); // 10000
const EXPAND_T_AT_SLOW = (EXPAND_BASE_SCORE + EXPAND_OFFSET) * Math.pow(EXPAND_RATIO, EXPAND_SLOW_COL - BASE_COLS) - EXPAND_OFFSET;  // threshold[12] = 51954
const EXPAND_SCALE_SLOW = EXPAND_T_AT_SLOW + EXPAND_OFFSET_SLOW;
function colsForScore(score) {
  if (score < EXPAND_BASE_SCORE) return BASE_COLS;
  if (score < EXPAND_T_AT_SLOW) {
    // Phase 1: widths 7..12 at 1.5x + 2500
    return BASE_COLS + 1 + Math.floor(Math.log((score + EXPAND_OFFSET) / (EXPAND_BASE_SCORE + EXPAND_OFFSET)) / Math.log(EXPAND_RATIO));
  }
  // Phase 2: widths 13+ at 1.25x + 2500, continuing from threshold[12]
  return EXPAND_SLOW_COL + Math.floor(Math.log((score + EXPAND_OFFSET_SLOW) / EXPAND_SCALE_SLOW) / Math.log(EXPAND_RATIO_SLOW));
}

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let CW = canvas.width, CH = canvas.height;
// Tiles are a fixed size derived from the (constant) canvas height. The canvas
// WIDTH grows with the column count so panels never shrink as the board widens.
const TILE = Math.floor(CH / (BASE_ROWS + 1));

let stack = null;
let paused = false;
let gameStarted = false;
let lastInput = {};
let acc = 0;                 // fixed-step accumulator
let lastT = 0;
let gameStartMs = 0;         // wall-clock ms when the current game started
let gameElapsedMs = 0;       // accumulated play time (paused time excluded)

// ---- high scores (persisted in localStorage) ----
// localStorage is the right tool here: synchronous, survives reloads, no
// server round-trip needed (unlike cookies, which are for HTTP headers).
const HS_KEY = 'pdp_best_v1';
function loadBest() {
  try {
    const raw = localStorage.getItem(HS_KEY);
    if (raw) { const o = JSON.parse(raw); return { score: o.score|0, chain: o.chain|0, combo: o.combo|0 }; }
  } catch (e) {}
  return { score: 0, chain: 0, combo: 0 };
}
function saveBest(b) {
  try { localStorage.setItem(HS_KEY, JSON.stringify(b)); } catch (e) {}
}
let best = loadBest();       // { score, chain, combo } — personal records across runs

// Classic Easy is the only game mode. Game ends when blocks reach the top.
const PRESET = CLASSIC_ENDLESS_PRESETS['classic-easy'];

function gridDims() {
  return { cols: stack.width, rows: BASE_ROWS };
}

function newGame() {
  stack = new Stack({ width: BASE_COLS, height: BASE_ROWS, levelData: PRESET, seed: (Math.random()*1e9)|0 });
  stack.startingState(7);
  stack.input_state = {};
  gameStarted = true; paused = false;
  acc = 0; lastT = 0;
  gameStartMs = performance.now();
  gameElapsedMs = 0;
  expansionFx = null;            // cancel any in-progress expansion transition
  // size the canvas to the starting column count
  canvas.width = TILE * BASE_COLS;
  CW = canvas.width;
  hideOverlay();
  updateHUD();
}

// Board expansion transition: when colsForScore wants more columns, we don't
// grow instantly — a ~2s lightning effect plays at the board's right edge,
// THEN the new column(s) appear. During the transition the board keeps its
// old width so gameplay is undisturbed.
let expansionFx = null;   // { frame, total, targetCols }
const EXPAND_FX_FRAMES = 120;

function expandIfNeeded() {
  // If a transition is in progress, tick it and finalize when complete.
  if (expansionFx) {
    expansionFx.frame++;
    if (expansionFx.frame >= expansionFx.total) {
      const target = expansionFx.targetCols;
      expansionFx = null;
      doExpand(target);
    }
    return;
  }
  const want = colsForScore(stack.score);
  if (want === stack.width) return;
  // Start the lightning transition instead of growing instantly.
  expansionFx = { frame: 0, total: EXPAND_FX_FRAMES, targetCols: want };
}

function doExpand(target) {
  // grow columns: append a panel to every existing row (incl. buffer).
  for (let r = 0; r < stack.panels.length; r++) {
    for (let c = stack.width; c < target; c++) {
      const p = stack._newPanel(r, c);
      // populate the rising/incoming row (row 0) with a random block so the
      // new column doesn't look empty. Match the 'dimmed' incoming state.
      if (r === 0) {
        p.color = 1 + ((Math.random() * stack.levelData.colorCount) | 0);
        p.state = 'dimmed';
      }
      stack.panels[r][c] = p;
    }
  }
  stack.width = target;
  // grow the canvas width to fit the wider board (tiles stay fixed size)
  canvas.width = TILE * target;
  CW = canvas.width;
  // keep cursor in bounds (cursor spans 2 columns, so max col = width-2)
  stack.cur_col = bound(0, stack.cur_col, stack.width - 2);
}

// ---- input ----
const KEYS = {
  ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
  KeyW:'up', KeyS:'down', KeyA:'left', KeyD:'right',
  KeyZ:'swap', Space:'swap', KeyX:'raise', ShiftLeft:'raise', ShiftRight:'raise',
};
// Swap is EDGE-TRIGGERED: fires once per key-down, NOT while held. A held key
// on a keyboard spans many fixed-timestep frames; level-triggering (the
// authentic Lua model, designed for per-frame lockstep input) would fire a
// swap every ~2 frames — the "double swap" bug. Only a fresh keypress counts.
let swapKeyDown = false;   // is the swap key physically down right now?
let swapEdge = false;      // edge flag: set on key-down, cleared when consumed
window.addEventListener('keydown', e => {
  if (e.code === 'KeyP') {
    if (!paused) { gameElapsedMs += performance.now() - gameStartMs; }   // freezing
    else         { gameStartMs = performance.now(); }                    // resuming
    paused = !paused; (paused?showOverlay:hideOverlay)('PAUSED'); e.preventDefault(); return;
  }
  if (e.code === 'Enter') { newGame(); e.preventDefault(); return; }
  if (e.code === 'KeyR') { newGame(); e.preventDefault(); return; }
  const k = KEYS[e.code];
  if (k) {
    if (k === 'swap') {
      if (!swapKeyDown) swapEdge = true;   // only the initial press, not auto-repeat
      swapKeyDown = true;
    } else {
      lastInput[k] = true;
    }
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => {
  const k = KEYS[e.code];
  if (k) {
    if (k === 'swap') swapKeyDown = false;
    lastInput[k] = false;
    e.preventDefault();
  }
});

// ---- fixed-timestep loop ----
function loop(ts) {
  requestAnimationFrame(loop);
  if (!lastT) lastT = ts;
  let dt = ts - lastT; lastT = ts;
  if (dt > 250) dt = 250;            // avoid spiral after tab-switch
  if (!gameStarted || paused || !stack || stack.game_over) { render(); return; }

  acc += dt;
  const STEP = 1000 / 60;
  let runs = 0;
  while (acc >= STEP && runs < stack.max_runs_per_frame * 4) {
    stepInput();
    stack.run();
    expandIfNeeded();
    acc -= STEP; runs++;
    if (stack.game_over) { onGameOver(); break; }
  }
  if (acc > STEP * (stack.max_runs_per_frame * 4)) acc = 0; // shed backlog
  updateHUD();
  render();
}

function stepInput() {
  stack.input_state = {
    up: !!lastInput.up, down: !!lastInput.down, left: !!lastInput.left, right: !!lastInput.right,
    swap: swapEdge,        // edge-triggered: true for exactly one step per keypress
    raise: !!lastInput.raise,
  };
  swapEdge = false;        // consume — held key produces no further swaps
}

function onGameOver() {
  if (gameStartMs === 0) return;                            // already frozen — idempotent
  gameElapsedMs += performance.now() - gameStartMs;   // freeze timer
  gameStartMs = 0;
  // Update + persist high scores
  let beat = false;
  if (stack.score > best.score) { best.score = stack.score; beat = true; }
  if (stack.max_chain > best.chain) { best.chain = stack.max_chain; beat = true; }
  if (stack.max_combo > best.combo) { best.combo = stack.max_combo; beat = true; }
  if (beat) { saveBest(best); updateBest(); }
  showOverlay('GAME OVER', 'Score ' + stack.score, 'Press Enter or R to restart');
}

// ---- HUD ----
function el(id){ return document.getElementById(id); }
function fmtTime(ms) {
  const s = Math.floor(ms / 1000);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}
function currentElapsed() {
  if (stack && stack.game_over) return gameElapsedMs;           // frozen
  if (!gameStarted || paused) return gameElapsedMs;             // paused
  return gameElapsedMs + (performance.now() - gameStartMs);     // running
}
function updateHUD() {
  if (!stack) return;
  el('hTime').textContent = fmtTime(currentElapsed());
  el('hScore').textContent = stack.score;
  el('hSpeed').textContent = stack.speed;
  el('hMaxChain').textContent = stack.max_chain > 0 ? 'x' + stack.max_chain : '-';
  el('hMaxCombo').textContent = stack.max_combo > 0 ? stack.max_combo : '-';
  el('hCleared').textContent = stack.panels_cleared;
  // Width row: hidden until the first board expansion (surprise mechanic)
  if (stack.width > BASE_COLS) {
    el('hWidthRow').classList.remove('hidden');
    el('hWidth').textContent = stack.width;
  }
  updateStats();
}

function updateStats() {
  const ct = stack.chain_tally, mt = stack.combo_tally;
  function colRows(tally, suffix) {
    const keys = Object.keys(tally).map(Number).filter(k => tally[k] > 0).sort((a, b) => a - b);
    let h = '';
    for (const k of keys) h += '<div class="srow"><span>' + (suffix ? k + suffix : k) + '</span><span>' + tally[k] + '</span></div>';
    return h;
  }
  const chainRows = colRows(ct, 'x');
  const comboRows = colRows(mt);
  if (!chainRows && !comboRows) {
    el('statsBody').innerHTML = '<div class="sempty">no chains or combos yet</div>';
    return;
  }
  let html = '<div class="cols">';
  html += '<div class="col"><div class="sthead">chains</div>' + (chainRows || '<div class="sempty">&mdash;</div>') + '</div>';
  html += '<div class="col"><div class="sthead">combos</div>' + (comboRows || '<div class="sempty">&mdash;</div>') + '</div>';
  html += '</div>';
  el('statsBody').innerHTML = html;
}

// ---- high score card ----
function updateBest() {
  function setVal(id, v, suffix) {
    const e = el(id);
    if (v > 0) { e.textContent = suffix ? suffix + v : v; e.classList.remove('dash'); }
    else       { e.textContent = '-'; e.classList.add('dash'); }
  }
  setVal('bScore', best.score);
  setVal('bChain', best.chain, 'x');
  setVal('bCombo', best.combo);
}
function showOverlay(title, l1, l2) {
  el('ovTitle').textContent = title;
  el('ovLine1').textContent = l1 || ''; el('ovLine1').className = l1 ? '' : 'hidden';
  el('ovLine2').textContent = l2 || ''; el('ovLine2').className = l2 ? '' : 'hidden';
  el('overlay').classList.remove('hidden');
}
function hideOverlay(){ el('overlay').classList.add('hidden'); }

// ---- rendering ----
function render() {
  ctx.clearRect(0, 0, CW, CH);
  if (!stack) return;
  const dims = { cols: stack.width, rows: stack.height };
  const tile = Math.floor(Math.min(CW / dims.cols, CH / (dims.rows + 1)));
  const gridW = tile * dims.cols, gridH = tile * dims.rows;
  const ox = Math.floor((CW - gridW) / 2);
  const oy = Math.floor(CH - gridH - tile);   // reserve one tile at bottom for the dimmed spawn buffer

  // rise offset: stack sinks (displacement/16)*tile then rises to 0.
  // Rounded to integer pixels — a fractional translate makes Firefox
  // re-anti-alias every panel edge per frame (Chrome tolerates sub-pixel).
  const riseOff = Math.round((stack.displacement / 16) * tile);

  ctx.save();
  ctx.translate(ox, oy + riseOff);

  // play area background (+ spawn buffer strip below the play rows)
  ctx.fillStyle = '#0b0d18';
  ctx.fillRect(0, -tile, gridW, gridH + tile * 2);

  // draw panels row 1..height (+ any overflow rows)
  const maxRow = stack.panels.length - 1;
  for (let r = 1; r <= maxRow; r++) {
    for (let c = 0; c < stack.width; c++) {
      const p = stack.panels[r][c];
      if (p.color === 0) continue;
      // y grows downward; row 1 is the bottom. y = gridH - r*tile
      const x = c * tile;
      const y = gridH - r * tile;
      drawPanel(p, x, y, tile);
    }
  }
  // spawn buffer row 0 = the incoming row, not yet in play. Heavily dimmed
  // (keyed to its 'dimmed' state); snaps to full alpha the instant it rises
  // into play (row 1, state flips to 'normal'). No gradual undim.
  for (let c = 0; c < stack.width; c++) {
    const p = stack.panels[0][c];
    if (p.color === 0) continue;
    const x = c * tile, y = gridH;
    const incoming = p.state === 'dimmed';
    ctx.globalAlpha = incoming ? 0.12 : 1;
    drawPanel(p, x, y, tile);
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  // floating chain/combo cards — drawn in screen space (outside translate) so
  // they're never clipped. Positioned relative to the board origin + rise offset.
  drawCards(ox, oy, riseOff, gridH, tile);

  // loss-threshold bar: STATIC white line marking where game over triggers.
  // The topmost block's top edge reaches screen y = oy + TILE when new_row()
  // fires and pushes it into the top play row (row 12). Drawn outside the
  // rise-offset translate so it never moves.
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.fillRect(ox, oy + tile - 1, gridW, 2);

  // expansion lightning transition: crackling energy at the board's right edge
  // where the new column(s) will appear.
  if (expansionFx) drawExpansionFx(ox, oy, gridW, gridH, tile);

  // cursor (2 tiles wide)
  const cc = stack.cur_col, cr = stack.cur_row;
  const cx = ox + cc * tile;
  const cy = oy + riseOff + gridH - cr * tile;
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3;
  ctx.strokeRect(cx + 1, cy + 1, tile * 2 - 2, tile - 2);

  // danger flash when topped out
  if (stack.wasToppedOut) {
    ctx.fillStyle = 'rgba(255,60,60,0.10)';
    ctx.fillRect(0, 0, CW, CH);
  }
}

// ---- expansion lightning effect ----
// Plays when the board is about to widen. Crackling bolts run down the right
// edge of the board plus a bright flash that peaks as the column appears.
function drawExpansionFx(ox, oy, gridW, gridH, tile) {
  const fx = expansionFx;
  const t = fx.frame / fx.total;                 // 0..1 progress
  const x = ox + gridW;                          // right edge of current board
  const top = oy - tile;                         // include spawn-buffer strip
  const bottom = oy + gridH;

  // intensity bell curve: ramps up, peaks near the end, then the column pops in
  let intensity = Math.sin(t * Math.PI);          // 0 -> 1 -> 0
  // final flash on the last few frames for the "appearance" beat
  if (t > 0.82) intensity = Math.max(intensity, 1.0);
  // per-frame flicker so the bolts feel alive
  const flicker = 0.55 + Math.random() * 0.45;
  const a = Math.min(1, intensity * flicker);

  // whole-board flash overlay (bright at the right edge, fading left)
  const grad = ctx.createLinearGradient(x - tile * 3, 0, x, 0);
  grad.addColorStop(0, 'rgba(150,200,255,0)');
  grad.addColorStop(1, 'rgba(180,220,255,' + (a * 0.35).toFixed(3) + ')');
  ctx.fillStyle = grad;
  ctx.fillRect(x - tile * 3, top, tile * 3, bottom - top);

  ctx.save();
  ctx.shadowColor = '#8be9fd';
  ctx.shadowBlur = 16;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // a few jagged bolts running down the seam, regenerating each frame
  const nBolts = 2 + ((Math.random() * 2) | 0);
  for (let b = 0; b < nBolts; b++) {
    const bx = x + (Math.random() - 0.5) * tile * 0.6;
    ctx.strokeStyle = 'rgba(220,240,255,' + (a * (0.6 + Math.random() * 0.4)).toFixed(3) + ')';
    ctx.lineWidth = 1.5 + Math.random() * 2.5;
    drawLightningBolt(bx, top, bottom, tile);
  }

  // bright core seam line
  ctx.strokeStyle = 'rgba(255,255,255,' + a.toFixed(3) + ')';
  ctx.lineWidth = 2 + intensity * 2;
  ctx.beginPath();
  ctx.moveTo(x, top);
  ctx.lineTo(x, bottom);
  ctx.stroke();

  ctx.restore();
}

// one jagged vertical lightning bolt with random horizontal jitter + branches
function drawLightningBolt(x, top, bottom, tile) {
  const segs = 10;
  const step = (bottom - top) / segs;
  const jitter = tile * 0.35;
  ctx.beginPath();
  ctx.moveTo(x, top);
  let px = x;
  for (let i = 1; i <= segs; i++) {
    px = x + (Math.random() - 0.5) * jitter;
    ctx.lineTo(px, top + step * i);
  }
  ctx.stroke();
  // a couple of short branches off the main bolt
  for (let i = 0; i < 2; i++) {
    const by = top + Math.random() * (bottom - top);
    ctx.beginPath();
    ctx.moveTo(x, by);
    ctx.lineTo(x + (Math.random() - 0.5) * jitter * 1.6, by + (Math.random() - 0.3) * step * 1.5);
    ctx.stroke();
  }
}

// ---- floating chain/combo cards (PlayerStack.lua 489-518) ----
// When a chain link or large combo matches, a numbered card spawns at the
// match origin and floats upward over ~41 frames, fading to 50% opacity.
// Chain cards show "×N" in gold; combo cards show "N" in cyan.
function cardOpacity(frame) {
  if (frame < 1) return 1;
  return 1 - Math.min(0.5 * ((frame - 1) / 21), 0.5);
}

function drawCards(ox, oy, riseOff, gridH, tile) {
  if (!stack.card_q || stack.card_q.length === 0) return;
  const scale = tile / 16;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const card of stack.card_q) {
    const animY = CARD_ANIM[card.frame];
    if (animY === undefined || animY === null) continue;
    const cx = ox + card.col * tile + tile / 2;
    const cy = oy + riseOff + gridH - card.row * tile + tile / 2 - animY * scale;
    const opacity = cardOpacity(card.frame);
    const isChain = card.chain;
    const fontSize = Math.round(tile * 0.52);

    // glow + background square
    ctx.shadowColor = isChain ? 'rgba(255,215,0,0.7)' : 'rgba(79,217,232,0.7)';
    ctx.shadowBlur = tile * 0.35;
    const half = tile * 0.38;
    const rad = Math.max(2, Math.floor(tile * 0.12));
    ctx.fillStyle = isChain
      ? 'rgba(218,165,32,' + opacity.toFixed(3) + ')'
      : 'rgba(30,140,200,' + opacity.toFixed(3) + ')';
    roundRect(cx - half, cy - half, half * 2, half * 2, rad);
    ctx.fill();
    // inner border for definition
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,' + (opacity * 0.6).toFixed(3) + ')';
    ctx.lineWidth = 2;
    roundRect(cx - half, cy - half, half * 2, half * 2, rad);
    ctx.stroke();

    // number text
    const label = isChain ? '\u00d7' + card.n : String(card.n);
    ctx.font = 'bold ' + fontSize + 'px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,' + opacity.toFixed(3) + ')';
    ctx.fillText(label, cx, cy + 1);
  }
  ctx.restore();
}

function drawPanel(p, x, y, tile) {
  const col = COLORS[p.color]; if (!col) return;
  const pad = Math.max(1, Math.floor(tile * 0.06));
  let bx = x + pad, by = y + pad, bw = tile - pad * 2, bh = tile - pad * 2;

  // swap animation slide
  if (p.state === 'swapping') {
    const slide = (p.timer / 4) * tile * (p.isSwappingFromLeft ? -1 : 1);
    bx += slide;
  }

  // state-based styling
  let main = col.main, alpha = 1;
  if (p.state === 'matched') {
    const ft = p.frameTimes;
    const total = ft.FLASH + ft.FACE + 1;
    if (p.timer > ft.FACE) { main = '#ffffff'; }          // FLASH: white
    else { main = '#7a2030'; }                            // FACE: distressed dark red
  } else if (p.state === 'popping' || p.state === 'popped') {
    alpha = Math.max(0, p.timer / (p.frameTimes.POP * (p.combo_size || 1)));
    alpha = Math.max(0.1, alpha);
  } else if (p.state === 'falling' || p.state === 'hovering') {
    // subtle
  } else if (p.state === 'landing') {
    const sq = 1 - (p.timer / 12) * 0.12;
    bh *= sq; by += (tile - pad * 2) * (1 - sq);
  }

  // Draw body + symbol at the panel's alpha, then restore globalAlpha exactly.
  // The old `*= alpha` / `/= alpha` pattern left a float-precision residue in
  // Firefox (which stores globalAlpha at reduced precision), leaking a tiny
  // alpha into every panel drawn afterwards — the same row and all rows above
  // a clearing block — producing a visible brightness flicker during the clear
  // animation. Chrome's full-precision globalAlpha masked it.
  const ga = ctx.globalAlpha;
  ctx.globalAlpha = ga * alpha;
  // snap to integer pixels: Firefox re-rasterises sub-pixel fills (especially
  // arcTo rounded corners with a fractional radius) with per-frame AA variance
  const rx = Math.round(bx), ry = Math.round(by), rw = Math.round(bw), rh = Math.round(bh);
  roundRect(rx, ry, rw, rh, Math.floor(Math.max(2, tile * 0.12)));
  ctx.fillStyle = main;
  ctx.fill();
  // symbol (lighter shade), ~90% of tile — fades with the body
  drawSymbol(col.symbol, rx, ry, rw, rh, col.light);
  ctx.globalAlpha = ga;
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawSymbol(kind, x, y, w, h, color) {
  const cx = x + w / 2, cy = y + h / 2;
  const s = Math.min(w, h) * 0.42;
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(2, s * 0.14);
  ctx.lineJoin = 'round';
  ctx.beginPath();
  switch (kind) {
    case 'heart': {
      const k = s;
      ctx.moveTo(cx, cy + k * 0.85);
      ctx.bezierCurveTo(cx - k * 1.4, cy - k * 0.2, cx - k * 0.5, cy - k, cx, cy - k * 0.25);
      ctx.bezierCurveTo(cx + k * 0.5, cy - k, cx + k * 1.4, cy - k * 0.2, cx, cy + k * 0.85);
      ctx.fill();
      break;
    }
    case 'star': {
      for (let i = 0; i < 10; i++) {
        const a = -Math.PI / 2 + i * Math.PI / 5;
        const rad = (i % 2 === 0) ? s : s * 0.45;
        const px = cx + Math.cos(a) * rad, py = cy + Math.sin(a) * rad;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.fill();
      break;
    }
    case 'diamond': {
      ctx.moveTo(cx, cy - s); ctx.lineTo(cx + s * 0.8, cy);
      ctx.lineTo(cx, cy + s); ctx.lineTo(cx - s * 0.8, cy); ctx.closePath();
      ctx.fill();
      break;
    }
    case 'triangle': {
      ctx.moveTo(cx, cy - s);
      ctx.lineTo(cx + s * 0.9, cy + s * 0.75);
      ctx.lineTo(cx - s * 0.9, cy + s * 0.75); ctx.closePath();
      ctx.fill();
      break;
    }
    case 'circle': {
      ctx.arc(cx, cy, s, 0, Math.PI * 2); ctx.fill();
      break;
    }
    case 'square': {
      const q = s * 0.85;
      ctx.fillRect(cx - q, cy - q, q * 2, q * 2);
      break;
    }
  }
}

// boot
newGame();
updateBest();
requestAnimationFrame(loop);

} // end DOM guard
